---
name: Build Image (Dockerhub)

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - 'docs/**'
      - '.github/**'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: 'stable'
        check-latest: true

    - name: Verify dependencies
      run: go mod verify

    - name: Lint with golangci-lint
      uses: golangci/golangci-lint-action@v6
      with:
        version: latest

    - name: Lint with go vet
      run: go vet ./...

    - name: Test with coverage
      run: go test -race -count=1 -coverprofile=coverage.out ./...

    - name: Check coverage ≥ 80%
      run: |
        go tool cover -func=coverage.out | grep total | \
          awk '{print $3}' | awk -F'%' '{if ($1 < 80) exit 1}'

    - name: Build check
      run: go build ./...

  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    needs: [lint]
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'go' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}

    - name: Autobuild
      uses: github/codeql-action/autobuild@v3

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3

  build:
    name: Build and Push to Docker Hub
    environment: DOCKERHUB
    runs-on: ubuntu-latest
    needs: [lint, analyze]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login on DockerHub
        run: |
          docker login -u ${{ secrets.DOCKERHUB_USERNAME }} \
            -p ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build --no-cache --rm \
            -t ${{ github.repository }}:v0.${{ github.run_number }} \
            -f ./Dockerfile .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ github.repository }}:v0.${{ github.run_number }}'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Push to DockerHub
        run: docker push ${{ github.repository }}:v0.${{ github.run_number }}

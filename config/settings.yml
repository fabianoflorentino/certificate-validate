---
check_time: 30

app_configs:
  - name: 'certificate-validate'
    host: '0.0.0.0'
    port: '5000'
    environment: 'development'
    debug: True 

prometheus:
  enabled: false
  # address: ':9090'   # uncomment to use a separate listen address

webhook:
  # url: 'https://hooks.example.com/alert'
  threshold: 15  # alert when days left drops below this
  interval: 1800 # check every 30 minutes

history:
  enabled: true
  file_path: "data/history.jsonl"
  max_entries: 10000
  max_days: 90

trusted_cas:
  # - '/path/to/self-signed-ca.pem'

hosts:
  - name: "GitHub"
    url: 'github.com'
    port: '443'
  - name: "GitLab"
    url: 'gitlab.com'
    port: '443'
  - name: "Google"
    url: 'google.com'
    port: '443'
  - name: "Stack Overflow"
    url: 'stackoverflow.com'
    port: '443'
  - name: "Docker"
    url: 'docker.com'
    port: '443'
  - name: "Cloudflare"
    url: 'cloudflare.com'
    port: '443'
  - name: "Amazon"
    url: 'amazon.com'
    port: '443'
  - name: "Microsoft"
    url: 'microsoft.com'
    port: '443'
  - name: "Kubernetes"
    url: 'kubernetes.io'
    port: '443'
  - name: "NPM"
    url: 'npmjs.com'
    port: '443'

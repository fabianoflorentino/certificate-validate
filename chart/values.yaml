# Default values for certificate-validate.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: fabianoflorentino/certificate-validate
  tag: latest
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 5000

resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 64Mi

config:
  check_time: 3600
  hosts:
    - name: "github"
      url: "github.com"
      port: "443"
    - name: "gitlab"
      url: "gitlab.com"
      port: "443"
  history:
    enabled: true
    filePath: "/data/history.jsonl"
    maxEntries: 10000
    maxDays: 90
  prometheus:
    enabled: true
  webhook:
    url: ""
    threshold: 30
    interval: 86400

persistence:
  enabled: true
  size: 1Gi
  accessMode: ReadWriteOnce

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: certificate-validate.local
      paths:
        - path: /
          pathType: ImplementationSpecific

nodeSelector: {}
tolerations: []
affinity: {}
